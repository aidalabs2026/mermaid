server {
    listen 80;
    listen [::]:80;
    server_name mermaid.aidalabs.kr;

    root /var/www/mermaid;
    index index.html;

    # Long-lived hashed assets (Astro emits content-hashed filenames)
    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|webp|avif|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Astro directory format: /preview/ → /preview/index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Let's Encrypt: certbot --nginx will append the 443 server block and HTTP→HTTPS redirect.
    # Do not pre-write the 443 block here; certbot edits this file in place.
}
